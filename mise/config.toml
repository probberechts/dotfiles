[settings]
experimental = false
gpg_verify = false

# tombi: format.rules.table-keys-order = "ascending"
[tools]
"aqua:Automattic/harper/harper-ls" = "latest"
"aqua:neovim/neovim" = "latest"
biome = "latest"
"cargo:selene" = "latest"
delta = "latest"
fd = "latest"
fzf = "latest"
github-cli = "latest"
"github:skanehira/version-lsp" = "latest"
go = "latest"
"go:github.com/mattn/efm-langserver" = "latest"
"http:git-relevant" = { version = "0.0.0", url = "https://raw.githubusercontent.com/davidosomething/git-relevant/refs/heads/master/git-relevant" }
"http:git-take" = { version = "0.0.0", url = "https://raw.githubusercontent.com/davidosomething/git-take/refs/heads/master/git-take" }
jq = "latest"
lua-language-server = "latest"
marksman = "latest"
node = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:@mdx-js/language-server" = "latest"
"npm:@vtsls/language-server" = "latest"
"npm:bibtex-tidy" = "latest"
"npm:gh-actions-language-server" = "latest"
"npm:markdownlint-cli" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"npm:yaml-language-server" = "latest"
"pipx:basedpyright" = "latest"
"pipx:jedi-language-server" = "latest"
"pipx:jupyterlab" = "latest"
"pipx:nox" = "latest"
"pipx:poetry" = "latest"
"pipx:td-watson" = "latest"
prettier = "latest"
python = "latest"
ripgrep = { version = "latest", postinstall = "[ -n \"${XDG_DATA_HOME}\" ] && mkdir -p ${XDG_DATA_HOME}/zsh/site-functions && rg --generate complete-zsh > ${XDG_DATA_HOME}/zsh/site-functions/_rg || true" }
ruby = "3.2"
ruff = "latest"
rust = "latest"
rust-analyzer = "latest"
shellcheck = "latest"
shfmt = "latest"
stylua = "latest"
tombi = "latest"
tree-sitter = "latest"
uv = "latest"
yamlfmt = "latest"
yamllint = "latest"
